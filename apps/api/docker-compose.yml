version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ragmark
      POSTGRES_PASSWORD: ragmark
      POSTGRES_DB: ragmark
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - production

volumes:
  pgdata:
